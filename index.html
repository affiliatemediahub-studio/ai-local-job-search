<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Local Job Search | Ready for John</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 p-6">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-slate-200 mt-12 text-center">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center text-white text-2xl mb-6">
            <i class="fas fa-robot"></i>
        </div>
        <h1 class="text-3xl font-extrabold mb-4">AI Agent Search</h1>
        <p class="text-slate-600 mb-8">Upload your resume to start the <strong>Realness Engine</strong>. No email activation required!</p>

        <!-- The "Nerves" of the App -->
        <input type="file" id="resumeFile" class="hidden" onchange="updateFileName(event)">
        <div class="border-2 border-dashed border-slate-300 rounded-2xl p-10 mb-6 cursor-pointer hover:border-blue-500 transition" onclick="document.getElementById('resumeFile').click()">
            <p id="fileName" class="text-slate-500 font-bold">Click to select your Resume</p>
        </div>

        <button onclick="startAI()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 shadow-lg transition">
            Start My Search Now
        </button>

        <!-- Status Message -->
        <div id="status" class="hidden mt-6 p-4 rounded-xl font-medium"></div>
    </div>

    <script>
        // THIS IS THE BRAIN URL
        const BACKEND = "https://ai-local-job-search-production.up.railway.app";

        function updateFileName(event) {
            document.getElementById('fileName').innerText = "Selected: " + event.target.files[0].name;
            document.getElementById('fileName').classList.replace('text-slate-500', 'text-blue-600');
        }

        async function startAI() {
            const file = document.getElementById('resumeFile').files[0];
            const status = document.getElementById('status');

            if (!file) { alert("Please select a file first!"); return; }

            status.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700');
            status.classList.add('bg-blue-50', 'text-blue-700');
            status.innerHTML = `<i class="fas fa-spinner fa-spin"></i> AI is parsing your resume on Railway...`;
            status.classList.remove('hidden');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${BACKEND}/upload-resume`, { method: 'POST', body: formData });
                const result = await response.json();

                if (result.status === "success") {
                    status.innerHTML = `<div class="bg-green-50 text-green-700 p-4 rounded-xl">✅ Success! AI found ${result.data.skills_identified.length} skills. Search is active.</div>`;
                } else {
                    throw new Error("AI Agent Offline");
                }
            } catch (err) {
                status.innerHTML = `<div class="bg-red-50 text-red-700 p-4 rounded-xl">⚠️ Connection Error. Ensure "Under Attack Mode" is OFF in Railway Settings.</div>`;
            }
        }
    </script>
</body>
</html>
